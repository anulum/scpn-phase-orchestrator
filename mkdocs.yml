site_name: SCPN Phase Orchestrator
site_url: https://anulum.github.io/scpn-phase-orchestrator
site_description: Domain-agnostic synchronisation-analysis and honest-evaluation toolkit built on Kuramoto/UPDE phase dynamics
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/scpn-phase-orchestrator
repo_name: anulum/scpn-phase-orchestrator
exclude_docs: |
  internal/**
  superpowers/**
copyright: "© 1996–2026 Miroslav Šotek. All rights reserved."

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

