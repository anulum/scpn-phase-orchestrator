name: autonomous_vehicles
version: "0.1.0"
safety_tier: research
sample_period_s: 0.01
control_period_s: 0.1

layers:
  - name: leader
    index: 0
    oscillator_ids: [leader_0]
  - name: followers
    index: 1
    oscillator_ids: [follower_0, follower_1, follower_2, follower_3]
  - name: road_env
    index: 2
    oscillator_ids: [road_0, road_1, road_2]

oscillator_families:
  vehicle:
    channel: P
    extractor_type: hilbert
    config: {}
  environment:
    channel: I
    extractor_type: event
    config: {}

coupling:
  base_strength: 0.50
  decay_alpha: 0.20
  templates: {}

drivers:
  physical:
    zeta: 0.03
    psi: 0.0
  informational:
    zeta: 0.01
  symbolic: {}

objectives:
  # Leader + followers = good; road_env is neutral (no bad).
  good_layers: [0, 1]
  bad_layers: []
  good_weight: 1.0
  bad_weight: 1.0

boundaries:
  - name: gap_distance_min
    variable: gap_distance
    lower: 0.2
    upper: null
    severity: hard
  - name: speed_delta_max
    variable: speed_delta
    lower: null
    upper: 0.5
    severity: soft
  - name: brake_reaction_max
    variable: brake_reaction
    lower: null
    upper: 0.3
    severity: hard

actuators:
  - name: platoon_coupling
    knob: K
    scope: global
    limits: [0.0, 5.0]
  - name: throttle_drive
    knob: zeta
    scope: global
    limits: [0.0, 2.0]

policy: policy.yaml
