rules:
  - name: tighten_formation
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 0
      op: "<"
      threshold: 0.4
    action:
      knob: K
      scope: global
      value: 0.3
      ttl_s: 5.0

  - name: suppress_formation_breakup
    regime: [NOMINAL, DEGRADED]
    condition:
      metric: R_bad
      layer: 0
      op: ">"
      threshold: 0.6
    action:
      knob: alpha
      scope: layer_0
      value: 0.3
      ttl_s: 8.0
