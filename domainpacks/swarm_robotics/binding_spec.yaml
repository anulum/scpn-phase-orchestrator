# SCPN Phase Orchestrator — Swarm Robotics Domain Binding Spec

name: swarm_robotics
version: "0.1.0"
safety_tier: consumer
sample_period_s: 0.01
control_period_s: 0.1

layers:
  - name: individual_heading
    index: 0
    oscillator_ids: [bot_0, bot_1, bot_2, bot_3]
    family: heading_angle
  - name: formation_shape
    index: 1
    oscillator_ids: [form_radius, form_angle]
    family: formation_event
  - name: flock_direction
    index: 2
    oscillator_ids: [flock_heading, flock_speed]
    family: formation_state
  - name: obstacle_field
    index: 3
    oscillator_ids: [obstacle_left, obstacle_right, obstacle_front]
    family: obstacle_phase
  - name: mission_intent
    index: 4
    oscillator_ids: [target_heading, target_spacing]
    family: mission_phase

# Vicsek et al., PRL 75(6), 1995.
# Heading alignment via local averaging = Kuramoto on the unit circle.
oscillator_families:
  heading_angle:
    channel: P
    extractor_type: physical
    config: {}
  formation_event:
    channel: I
    extractor_type: event
    config: {}
  # Vicsek model collective motion phases; Cucker & Smale (2007)
  formation_state:
    channel: S
    extractor_type: ring
    config:
      n_states: 4
  obstacle_phase:
    channel: Env
    extractor_type: graph
    config: {}
  mission_phase:
    channel: Mission
    extractor_type: event
    config: {}

channels:
  P:
    role: robot_heading
    units: rad
    metric_semantics: individual heading phase
  I:
    role: formation_event
    units: event_phase
    metric_semantics: formation-update cadence
  S:
    role: formation_state
    units: discrete_state_phase
    metric_semantics: formation topology state
  Env:
    role: obstacle_field
    required: false
    replay_semantics: state
    metric_semantics: obstacle proximity phase
  Mission:
    role: derived_mission_intent
    required: false
    replay_semantics: derived
    derived_from: [P, S, Env]
    derive_rule: target_phase = target_heading(P) + safe_spacing(S,Env)
    metric_semantics: target intent phase

channel_groups:
  navigation_surface:
    channels: [P, Env, Mission]
    required: true
    description: channels that steer heading and avoidance decisions
  formation_surface:
    channels: [I, S, Mission]
    required: true
    description: channels that constrain group formation

cross_channel_couplings:
  - source: Env
    target: P
    strength: 0.35
    mode: inhibitory
    template: obstacle_repulsion
  - source: Mission
    target: P
    strength: 0.30
    mode: directed
    template: mission_heading_drive

coupling:
  # Proximity-based communication: coupling decays with inter-robot distance.
  base_strength: 0.40
  decay_alpha: 0.30
  templates: {}

drivers:
  physical:
    zeta: 0.05
    psi: 0.0
  informational:
    zeta: 0.02
  symbolic:
    zeta: 0.02
  Env:
    zeta: 0.08
  Mission:
    cadence_hz: 0.5
    zeta: 0.03

objectives:
  # Heading alignment + flock coherence = good; formation breakup = bad.
  good_layers: [0, 2, 4]
  bad_layers: [1, 3]
  good_weight: 1.0
  bad_weight: 1.5

boundaries:
  # Cucker & Smale, IEEE TAC 2007.
  - name: formation_error
    variable: formation_error_m
    lower: null
    upper: 2.0
    severity: hard
  - name: collision_dist
    variable: min_dist_m
    lower: 0.5
    upper: null
    severity: hard
  - name: heading_variance
    variable: heading_var_rad
    lower: null
    upper: 1.0
    severity: soft

actuators:
  - name: alignment_coupling
    knob: K
    scope: global
    limits: [0.0, 5.0]
  - name: formation_drive
    knob: zeta
    scope: global
    limits: [0.0, 3.0]
  - name: obstacle_avoidance
    knob: alpha
    scope: layer_0
    limits: [0.0, 1.57]
  - name: target_heading
    knob: Psi
    scope: global
    limits: [0.0, 6.28]

amplitude:
  mu: 1.0
  epsilon: 0.4
  amp_coupling_strength: 0.25
  amp_coupling_decay: 0.3

policy: policy.yaml
