name: robotic_cpg
version: "0.1.0"
safety_tier: consumer
sample_period_s: 0.01
control_period_s: 0.1

layers:
  # Ijspeert (2008): central pattern generators for locomotion
  - name: left_leg
    index: 0
    oscillator_ids: [ll_hip, ll_knee]
    family: joint_cpg
  - name: right_leg
    index: 1
    oscillator_ids: [rl_hip, rl_knee]
    family: joint_cpg
  - name: left_arm
    index: 2
    oscillator_ids: [la_shoulder, la_elbow]
    family: joint_cpg
  - name: right_arm
    index: 3
    oscillator_ids: [ra_shoulder, ra_elbow]
    family: joint_cpg

oscillator_families:
  joint_cpg:
    channel: P
    extractor_type: physical
    config: {}
  contact_event:
    channel: I
    extractor_type: event
    config: {}
  # Gait mode: stand/walk/trot/gallop
  gait_mode:
    channel: S
    extractor_type: ring
    config:
      n_states: 4

coupling:
  # Contralateral anti-phase + ipsilateral in-phase (Righetti & Ijspeert 2006)
  base_strength: 0.5
  decay_alpha: 0.2
  templates: {}

drivers:
  physical:
    zeta: 0.04
    psi: 0.0
  informational:
    zeta: 0.02
  symbolic:
    zeta: 0.02

objectives:
  # Leg coordination = stable gait; arm swing follows passively
  good_layers: [0, 1]
  bad_layers: []
  good_weight: 1.0
  bad_weight: 1.0

boundaries:
  - name: joint_limit
    variable: joint_angle_rad
    lower: -2.0
    upper: 2.0
    severity: hard
  - name: torque_ceiling
    variable: joint_torque_nm
    lower: null
    upper: 50.0
    severity: hard

actuators:
  - name: coupling_global
    knob: K
    scope: global
    limits: [0.0, 3.0]
  - name: stride_frequency
    knob: zeta
    scope: global
    limits: [0.0, 3.0]
  - name: phase_bias
    knob: Psi
    scope: global
    limits: [0.0, 6.28]

amplitude:
  mu: 1.0
  epsilon: 0.3
  amp_coupling_strength: 0.2
  amp_coupling_decay: 0.3

policy: policy.yaml
