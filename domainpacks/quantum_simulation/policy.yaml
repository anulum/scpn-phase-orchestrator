# SCPN Phase Orchestrator — Quantum Simulation Domain Policy

rules:
  - name: boost_fidelity
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 0
      op: "<"
      threshold: 0.4
    action:
      knob: K
      scope: global
      value: 0.3
      ttl_s: 5.0

  - name: suppress_decoherence
    regime: [NOMINAL, DEGRADED]
    condition:
      metric: R_bad
      layer: 0
      op: ">"
      threshold: 0.6
    action:
      knob: zeta
      scope: global
      value: 0.2
      ttl_s: 8.0
