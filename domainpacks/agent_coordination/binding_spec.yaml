# SCPN Phase Orchestrator — Agent Coordination Domain Binding Spec

name: agent_coordination
version: "0.1.0"
safety_tier: research
sample_period_s: 1.0
control_period_s: 5.0

# Multi-agent AI coordination as a synchronisation problem.
# Each software agent or human operator is an oscillator.
# Synchronisation = agents working in harmony (no conflicts).
# Desynchronisation = task overlap, merge conflicts, wasted work.

layers:
  - name: heartbeat
    index: 0
    oscillator_ids: [agent_a_hb, agent_b_hb, agent_c_hb, human_hb]
    omegas: [0.1, 0.1, 0.1, 0.05]
    family: agent_liveness
  - name: task_flow
    index: 1
    oscillator_ids: [agent_a_tasks, agent_b_tasks, agent_c_tasks, human_tasks]
    omegas: [0.01, 0.01, 0.01, 0.005]
    family: task_cadence
  - name: topic_coherence
    index: 2
    oscillator_ids: [agent_a_topic, agent_b_topic, agent_c_topic, human_topic]
    omegas: [0.005, 0.005, 0.005, 0.005]
    family: topic_alignment

oscillator_families:
  agent_liveness:
    channel: P
    extractor_type: physical
    config: {}
  task_cadence:
    channel: I
    extractor_type: event
    config: {}
  topic_alignment:
    channel: S
    extractor_type: ring
    config:
      n_states: 4

coupling:
  # Agent coupling: shared files/tasks create synchronisation pressure.
  base_strength: 0.5
  decay_alpha: 0.1
  templates: {}

drivers:
  physical:
    zeta: 0.05
    psi: 0.0
  informational:
    zeta: 0.02
  symbolic:
    zeta: 0.01

objectives:
  # Heartbeat + task flow = healthy coordination.
  # Topic desync = agents talking past each other.
  good_layers: [0, 1]
  bad_layers: [2]
  good_weight: 1.0
  bad_weight: 1.5

boundaries:
  - name: conflict_detector
    variable: R
    lower: 0.2
    upper: null
    severity: hard
  - name: idle_detector
    variable: R_0
    lower: 0.3
    upper: null
    severity: soft

actuators:
  - name: task_redistributor
    knob: K
    scope: global
    limits: [0.0, 5.0]
  - name: deadline_drive
    knob: zeta
    scope: global
    limits: [0.0, 3.0]

imprint_model:
  decay_rate: 0.01
  saturation: 5.0
  modulates: ["K"]

protocol_net:
  places: [idle, claimed, merging]
  initial: {idle: 4, claimed: 0, merging: 0}
  place_regime: {}
  transitions:
    - name: claim_task
      inputs: [idle]
      outputs: [claimed]
      guard: "idle > 0"
    - name: release_task
      inputs: [claimed]
      outputs: [idle]
      guard: "claimed > 0"
    - name: start_merge
      inputs: [claimed]
      outputs: [merging]
      guard: "claimed > 0 and merging == 0"
    - name: finish_merge
      inputs: [merging]
      outputs: [idle]
      guard: "merging > 0"
