# SCPN Phase Orchestrator — Plasma Control Domain Binding Spec

name: plasma_control
version: "0.1.0"
safety_tier: research
sample_period_s: 0.001
control_period_s: 0.01

layers:
  - name: micro_turbulence
    index: 0
    oscillator_ids: [turb_0, turb_1]
  - name: zonal_flow
    index: 1
    oscillator_ids: [zonal_0, zonal_1]
  - name: mhd_tearing
    index: 2
    oscillator_ids: [mhd_0, mhd_1]
  - name: sawtooth_elm
    index: 3
    oscillator_ids: [saw_0, saw_1]
  - name: transport_barrier
    index: 4
    oscillator_ids: [tb_0, tb_1]
  - name: current_profile
    index: 5
    oscillator_ids: [cp_0, cp_1]
  - name: global_equilibrium
    index: 6
    oscillator_ids: [eq_0, eq_1]
  - name: plasma_wall
    index: 7
    oscillator_ids: [pw_0, pw_1]

oscillator_families:
  plasma_timescale:
    channel: P
    extractor_type: physical
    config: {}
  mhd_event:
    channel: I
    extractor_type: informational
    config: {}
  # Confinement regime: ohmic/L-mode/H-mode/ELMy/disruption
  # ITER Physics Basis Ch. 2 (1999)
  confinement_regime:
    channel: S
    extractor_type: ring
    config:
      n_states: 5

coupling:
  base_strength: 0.45
  decay_alpha: 0.3
  templates: {}

drivers:
  physical:
    zeta: 0.05
    psi: 0.0
  informational:
    zeta: 0.02
  symbolic:
    zeta: 0.01

objectives:
  good_layers: [4, 5, 6]
  bad_layers: [0, 2, 3]
  good_weight: 1.0
  bad_weight: 1.5

boundaries:
  - name: q_min
    variable: q_min
    lower: 1.0
    upper: null
    severity: hard
  - name: beta_n_limit
    variable: beta_n
    lower: null
    upper: 2.8
    severity: hard
  - name: greenwald_limit
    variable: greenwald
    lower: null
    upper: 1.2
    severity: hard
  - name: lyapunov_floor
    variable: lyapunov_score
    lower: 0.3
    upper: null
    severity: soft

actuators:
  - name: coupling_global
    knob: K
    scope: global
    limits: [0.0, 5.0]
  - name: lag_turbulence
    knob: alpha
    scope: layer_0
    limits: [0.0, 1.57]
  - name: damping_global
    knob: zeta
    scope: global
    limits: [0.0, 2.0]

amplitude:
  mu: 1.5
  epsilon: 0.4
  amp_coupling_strength: 0.2
  amp_coupling_decay: 0.3

policy: policy.yaml
