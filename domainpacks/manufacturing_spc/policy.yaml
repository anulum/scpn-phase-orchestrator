rules:
  - name: suppress_sensor_correlation
    regime: [NOMINAL, DEGRADED]
    condition:
      metric: R_bad
      layer: 0
      op: ">"
      threshold: 0.8
    action:
      knob: alpha
      scope: layer_0
      value: 0.4
      ttl_s: 5.0

  - name: restore_line_quality
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 2
      op: "<"
      threshold: 0.4
    action:
      knob: K
      scope: global
      value: 0.15
      ttl_s: 10.0
