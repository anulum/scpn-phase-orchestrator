# SCPN Phase Orchestrator — Edge Consensus N-Channel Policy

rules:
  - name: reinforce_gateway_lock
    regime: [NOMINAL, DEGRADED]
    priority: 20
    condition:
      metric: R_good
      op: "<"
      threshold: 0.72
    actions:
      - knob: K
        scope: global
        value: 0.14
        ttl_s: 1.0
    cooldown_s: 0.4
  - name: damp_gateway_lag
    regime: [NOMINAL, DEGRADED]
    priority: 10
    logic: AND
    conditions:
      - metric: R_1
        op: "<"
        threshold: 0.68
      - metric: R_global
        op: "<"
        threshold: 0.75
    actions:
      - knob: alpha
        scope: layer_1
        value: -0.05
        ttl_s: 1.0
    cooldown_s: 0.6
