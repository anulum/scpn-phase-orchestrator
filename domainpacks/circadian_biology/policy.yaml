# SCPN Phase Orchestrator — Circadian Biology Domain Policy

rules:
  - name: suppress_desynchrony
    regime: [NOMINAL, DEGRADED]
    condition:
      metric: R_bad
      layer: 0
      op: ">"
      threshold: 0.6
    action:
      knob: zeta
      scope: global
      value: 0.3
      ttl_s: 5.0

  - name: restore_scn_coherence
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 0
      op: "<"
      threshold: 0.4
    action:
      knob: K
      scope: global
      value: 0.2
      ttl_s: 10.0

  - name: meal_timing_reset
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 1
      op: "<"
      threshold: 0.3
    action:
      knob: Psi
      scope: global
      value: 3.14
      ttl_s: 8.0
