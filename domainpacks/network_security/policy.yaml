# SCPN Phase Orchestrator — Network Security Domain Policy

rules:
  - name: boost_defense_coupling
    regime: [DEGRADED, RECOVERY]
    condition:
      metric: R_good
      layer: 2
      op: "<"
      threshold: 0.3
    action:
      knob: K
      scope: global
      value: 0.3
      ttl_s: 8.0

  - name: suppress_attack_sync
    regime: [NOMINAL, DEGRADED]
    condition:
      metric: R_bad
      layer: 1
      op: ">"
      threshold: 0.6
    action:
      knob: zeta
      scope: global
      value: 0.15
      ttl_s: 5.0
