# SCPN Phase Orchestrator capability manifest configuration

project_label = "SCPN Phase Orchestrator"
schema_version = "capability-manifest.v1"
exclude_doc_parts = ["internal", "_generated"]

[paths]
json_output = "docs/_generated/capability_manifest.json"
markdown_output = "docs/_generated/capability_snapshot.md"
package_root = "src/scpn_phase_orchestrator"
domainpacks_root = "domainpacks"
tests_root = "tests"
docs_root = "docs"
workflows_root = ".github/workflows"
rust_root = "spo-kernel"

[product_boundaries]
core_engine = [
    "actuation",
    "binding",
    "coupling",
    "exceptions.py",
    "imprint",
    "monitor",
    "oscillators",
    "ssgf",
    "supervisor",
    "upde",
]
runtime_serving = [
    "apps",
    "artifacts",
    "assurance",
    "audit",
    "grpc_gen",
    "meta",
    "plugins",
    "reporting",
    "runtime",
    "scaffold",
    "studio",
]
integrations = ["adapters", "drivers"]
research_experimental = [
    "autotune",
    "experimental",
    "nn",
    "visualization",
]

[readme]
path = "README.md"
marker_start = "<!-- capability-snapshot:start -->"
marker_end = "<!-- capability-snapshot:end -->"

[labels]
version = "Package version"
public_api_exports = "Public API exports"
python_package_modules = "Python package modules"
core_engine_modules = "Core Engine modules"
runtime_serving_modules = "Runtime/Serving modules"
integration_modules = "Integration modules"
research_experimental_modules = "Research/Experimental modules"
domainpacks = "Domainpack files"
rust_kernel_files = "Rust kernel files"
optional_extras = "Optional extras"
test_files = "Python test files"
public_documentation_pages = "Public documentation pages"
github_workflows = "GitHub Actions workflows"
