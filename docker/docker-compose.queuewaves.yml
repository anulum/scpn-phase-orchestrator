# SCPN Phase Orchestrator — QueueWaves Docker Compose

version: "3.8"

services:
  queuewaves:
    build:
      context: ..
      dockerfile: docker/Dockerfile.queuewaves
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
