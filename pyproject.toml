# SCPN Phase Orchestrator — Build Configuration

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scpn-phase-orchestrator"
version = "0.5.0"
description = "Domain-agnostic coherence control compiler built on SCPN's Kuramoto/UPDE framework"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
authors = [
    { name = "Miroslav Sotek", email = "protoscience@anulum.li" },
]
keywords = ["kuramoto", "phase-dynamics", "coherence-control", "UPDE", "synchrony"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
    "pyyaml>=6.0",
    "click>=8.1",
]

[project.optional-dependencies]
rust = ["spo-kernel>=0.2.0"]
quantum = ["scpn-quantum-control>=0.1.0"]
plasma = ["scpn-control>=0.1.0"]
fusion = ["scpn-fusion-core>=3.9.0"]
scpn-all = [
    "spo-kernel>=0.2.0",
    "scpn-quantum-control>=0.1.0",
    "scpn-control>=0.1.0",
    "scpn-fusion-core>=3.9.0",
]
queuewaves = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "httpx>=0.27",
    "websockets>=12.0",
]
nengo = []  # pure-numpy LIF engine, no external deps
lava = ["lava-nc>=0.9"]
otel = ["opentelemetry-api>=1.20", "opentelemetry-sdk>=1.20"]
plot = ["matplotlib>=3.7"]
notebook = ["jupyter>=1.0", "nbconvert>=7.0", "matplotlib>=3.7"]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "hypothesis>=6.82",
    "coverage[toml]>=7.3",
    "ruff==0.15.6",
    "mypy>=1.8",
    "types-PyYAML>=6.0",
    "bandit>=1.7",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.24",
    "pymdown-extensions>=10.0",
    "pre-commit>=3.5",
    "twine>=5.0",
]

[project.scripts]
spo = "scpn_phase_orchestrator.cli:main"

[project.urls]
Homepage = "https://github.com/anulum/scpn-phase-orchestrator"
Repository = "https://github.com/anulum/scpn-phase-orchestrator"
Issues = "https://github.com/anulum/scpn-phase-orchestrator/issues"
Documentation = "https://anulum.github.io/scpn-phase-orchestrator/"
Changelog = "https://github.com/anulum/scpn-phase-orchestrator/blob/main/CHANGELOG.md"
Discussions = "https://github.com/anulum/scpn-phase-orchestrator/discussions"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
scpn_phase_orchestrator = ["py.typed", "apps/queuewaves/static/*"]

[tool.ruff]
line-length = 88
target-version = "py310"
exclude = ["src/scpn_phase_orchestrator/grpc_gen/spo_pb2.py", "src/scpn_phase_orchestrator/grpc_gen/spo_pb2_grpc.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "N", "S", "C4", "RET", "PTH"]
ignore = ["S101", "S104", "S310", "S603", "N802", "N803", "N806", "N815"]

[tool.mypy]
strict = false
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["scpn_phase_orchestrator.grpc_gen.spo_pb2", "scpn_phase_orchestrator.grpc_gen.spo_pb2_grpc"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
xfail_strict = true
filterwarnings = ["error::DeprecationWarning"]
asyncio_mode = "auto"
markers = [
    "integration: end-to-end integration tests",
    "contract: boundary-contract verification tests",
]

[tool.coverage.run]
source = ["scpn_phase_orchestrator"]
concurrency = ["thread"]
omit = [
    "*/grpc_gen/*",
]

[tool.coverage.report]
fail_under = 95

[tool.bandit]
exclude_dirs = ["tests"]
