# SCPN Phase Orchestrator — Kani formal verification

name: Kani

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "spo-kernel/kani/**"
      - "spo-kernel/Cargo.toml"
      - "spo-kernel/crates/spo-supervisor/**"
      - "spo-kernel/crates/spo-types/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kani-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install Kani
        run: cargo install --locked kani-verifier && cargo kani setup

      - name: Proof — action projector value clipping contract
        run: cargo kani -p spo-supervisor -Z function-contracts --harness action_projector_value_clipping_contract

      - name: Proof — adaptive rate limit contract
        run: cargo kani -p spo-supervisor -Z function-contracts --harness adaptive_rate_limit_contract

      - name: Proof — adaptive fixed-point rate limit contract
        run: cargo kani -p spo-supervisor -Z function-contracts --harness action_projector_adaptive_fixed_point_rate_limit_contract

      - name: Proof — nominal safe summary never classifies critical
        run: cargo kani -p spo-supervisor -Z function-contracts --harness nominal_safe_summary_never_classifies_critical

      - name: Proof — critical never evaluates directly to nominal
        run: cargo kani -p spo-supervisor -Z function-contracts --harness critical_never_evaluates_directly_to_nominal

      - name: Proof — degraded band from nominal is not critical
        run: cargo kani -p spo-supervisor -Z function-contracts --harness degraded_band_from_nominal_is_not_critical
