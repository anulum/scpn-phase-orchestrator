# SCPN Phase Orchestrator — Release automation

name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # keyless sigstore signing of the provenance
      attestations: write  # store the SLSA build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install --require-hashes -r requirements/release-tools.txt
          python -m build --sdist

      - name: Generate SBOM
        run: |
          pip install --require-hashes -r requirements/release-tools.txt
          pip install --no-deps -e .
          cyclonedx-py environment -o sbom.json --output-format json

      - name: Attest SLSA build provenance (sdist + SBOM)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            sbom.json

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python -c "
          import re, sys
          text = open('CHANGELOG.md').read()
          pattern = rf'## \[{re.escape(sys.argv[1])}\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else 'Release ' + sys.argv[1])
          " "$VERSION" > release_notes.md

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            sbom.json
          generate_release_notes: false
