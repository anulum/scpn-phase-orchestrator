# SCPN Phase Orchestrator — Release automation

name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install --require-hashes --no-deps -r requirements/release-tools.txt
          python -m build --sdist

      - name: Generate SBOM
        run: |
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
          cyclonedx-py environment -o sbom.json --output-format json

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python -c "
          import re, sys
          text = open('CHANGELOG.md').read()
          pattern = rf'## \[{re.escape(sys.argv[1])}\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else 'Release ' + sys.argv[1])
          " "$VERSION" > release_notes.md

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            sbom.json
          generate_release_notes: false
