# SCPN Phase Orchestrator — Stale issue/PR management

name: Stale

on:
  schedule:
    - cron: "0 6 * * 0"  # Sunday 06:00 UTC

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs. Add the `pinned` label to prevent this.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs.
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: pinned,roadmap
          exempt-pr-labels: pinned
          stale-issue-label: stale
          stale-pr-label: stale
