# SCPN Phase Orchestrator — Lean formal proof CI

name: Lean Proofs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/lean.yml"
      - "formal/lean/**"
      - "spo-kernel/crates/spo-supervisor/src/projector.rs"
      - "spo-kernel/crates/spo-supervisor/src/regime.rs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lean.yml"
      - "formal/lean/**"
      - "spo-kernel/crates/spo-supervisor/src/projector.rs"
      - "spo-kernel/crates/spo-supervisor/src/regime.rs"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal/lean
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formal/lean
          use-github-cache: false

      - name: Check Lean proofs
        run: bash ../../tools/check_lean_proofs.sh
