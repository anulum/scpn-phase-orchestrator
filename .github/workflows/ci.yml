# SCPN Phase Orchestrator — Continuous integration

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: python tools/check_version_sync.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: mypy src/scpn_phase_orchestrator/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (lockfile, 3.12 only)
        if: matrix.python-version == '3.12'
        run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - name: Install (loose, non-3.12)
        if: matrix.python-version != '3.12'
        run: pip install -e ".[dev,full,plot,otel,queuewaves,nn]"
      - name: Run tests (with coverage on 3.12)
        run: >
          pytest tests/ -v --tb=short
          ${{ matrix.python-version == '3.12' && '--cov=scpn_phase_orchestrator --cov-report=term-missing --cov-report=xml:coverage-python.xml' || '' }}
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-xml
          path: coverage-python.xml
      - name: Validate notebooks
        if: matrix.python-version == '3.12'
        run: |
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
          jupyter nbconvert --execute --to notebook notebooks/*.ipynb --ExecutePreprocessor.timeout=120

  coverage-guard:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-xml
      - run: python tools/coverage_guard.py --coverage-xml coverage-python.xml

  module-linkage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: python tools/check_test_module_linkage.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: bandit -r src/ -c pyproject.toml
      - run: pip install pip-audit==2.10.0 && pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-39892

  rust-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-${{ runner.os }}-stable-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-stable-
      - run: cargo fmt --check
      - run: cargo clippy --workspace --exclude spo-ffi -- -D warnings
      - run: cargo doc --no-deps --workspace --exclude spo-ffi
      - run: cargo test --workspace --exclude spo-ffi

  ffi-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-ffi-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-ffi-${{ runner.os }}-
      - name: Build and test (Unix, lockfile)
        if: runner.os != 'Windows' && matrix.python-version == '3.12'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
          pytest tests/ -v --tb=short
      - name: Build and test (Unix, loose)
        if: runner.os != 'Windows' && matrix.python-version != '3.12'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install -e ".[dev,full,plot,otel,queuewaves,nn]"
          pytest tests/ -v --tb=short
      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/Scripts/activate
          pip install maturin
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install -e ".[dev,full,plot,otel,nn]"
          pytest tests/ -v --tb=short

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: spo-kernel

  rust-msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # 1.83.0
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-msrv-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-msrv-
      - run: cargo check --workspace --lib --exclude spo-ffi

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: python bench/run_benchmarks.py --json > bench/current.json
      - name: Compare against baseline (informational)
        run: python bench/compare_baseline.py bench/baseline.json bench/current.json
        continue-on-error: true
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: benchmark-results
          path: bench/current.json

  ci-gate:
    needs: [lint, typecheck, test, security, rust-check, cargo-audit, rust-msrv, coverage-guard, module-linkage, ffi-test, benchmark]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
