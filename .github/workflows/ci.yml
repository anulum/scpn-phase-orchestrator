# SCPN Phase Orchestrator — Continuous integration

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: >
          interrogate src/scpn_phase_orchestrator
          --fail-under 100
          --ignore-init-method
          --ignore-magic
          --exclude src/scpn_phase_orchestrator/runtime/grpc_gen
          --quiet
      - run: python tools/check_version_sync.py
      - run: python tools/capability_manifest.py --check
      - run: python tools/build_studio_panel_data.py --check
      - run: python tools/check_spdx_headers.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: mypy src/scpn_phase_orchestrator/ tools/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            lockfile: requirements/dev-lock-py311.txt
          - python-version: "3.12"
            lockfile: requirements/dev-lock.txt
          - python-version: "3.13"
            lockfile: requirements/dev-lock-py313.txt
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (lockfile)
        run: pip install --require-hashes --no-deps -r ${{ matrix.lockfile }} && pip install --no-deps -e .
      - name: Run tests (with coverage on 3.12)
        run: >
          pytest tests/ -v --tb=short
          --ignore=tests/test_kuramoto_layer.py
          --ignore=tests/test_stuart_landau_nn.py
          --ignore=tests/test_bold.py
          --ignore=tests/test_reservoir.py
          --ignore=tests/test_ude_kuramoto.py
          --ignore=tests/test_inverse.py
          --ignore=tests/test_oim.py
          --ignore=tests/test_quantum_bridge_live.py
          --ignore=tests/test_geometry_walk.py
          --ignore-glob=tests/test_nn_physics_validation*.py
          -m "not slow and not performance"
          -k "not performance"
          ${{ matrix.python-version == '3.12' && '--cov=scpn_phase_orchestrator --cov-report=term-missing --cov-fail-under=0' || '' }}
      - name: Rename coverage data (test)
        if: matrix.python-version == '3.12'
        run: mv .coverage .coverage.test
      - name: Upload coverage data (test)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data-test
          path: .coverage.test
          include-hidden-files: true
      - name: Validate notebooks
        if: matrix.python-version == '3.12'
        run: |
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
          jupyter nbconvert --execute --to notebook notebooks/*.ipynb --ExecutePreprocessor.timeout=120

  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - name: Run slow stability tests once
        run: >
          pytest tests/ -v --tb=short
          --ignore=tests/test_kuramoto_layer.py
          --ignore=tests/test_stuart_landau_nn.py
          --ignore=tests/test_bold.py
          --ignore=tests/test_reservoir.py
          --ignore=tests/test_ude_kuramoto.py
          --ignore=tests/test_inverse.py
          --ignore=tests/test_oim.py
          --ignore=tests/test_quantum_bridge_live.py
          --ignore=tests/test_geometry_walk.py
          --ignore-glob=tests/test_nn_physics_validation*.py
          -m slow

  nn-coverage:
    # The slow nn/physics-validation test files are --ignore'd in both the main
    # ``test`` job (``-m "not slow"``) and the ``slow-tests`` job (``-m slow``)
    # because they are slow-running but not slow-MARKED, so they fall through both
    # filters. They fully exercise the nn modules (e.g. test_inverse.py drives
    # nn/inverse.py to 100%), but their coverage was never collected, leaving the
    # nn subsystem artificially low in the merged report. This lane runs exactly
    # those files WITH coverage so the merged coverage reflects reality. The set is
    # split into shards because the whole set under coverage exceeds a single job's
    # wall-clock budget; each shard's coverage data is merged in ``coverage-guard``.
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: a
            files: tests/test_inverse.py tests/test_oim.py tests/test_bold.py
          - shard: b
            files: tests/test_reservoir.py tests/test_ude_kuramoto.py tests/test_kuramoto_layer.py tests/test_stuart_landau_nn.py
          - shard: c
            files: tests/test_nn_physics_validation.py
          - shard: d
            files: tests/test_nn_physics_validation_p7.py tests/test_nn_physics_validation_p8.py tests/test_nn_physics_validation_p9.py tests/test_nn_physics_validation_p10.py tests/test_nn_physics_validation_p11.py tests/test_nn_physics_validation_p12.py tests/test_nn_physics_validation_p13.py
          - shard: e
            files: tests/test_nn_physics_validation_p2.py
          - shard: f
            files: tests/test_nn_physics_validation_p3.py tests/test_nn_physics_validation_p4.py
          - shard: g
            files: tests/test_nn_physics_validation_p5.py tests/test_nn_physics_validation_p6.py
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - name: Run nn/physics tests (shard ${{ matrix.shard }}) with coverage
        run: >
          pytest ${{ matrix.files }}
          --tb=short -p no:cacheprovider
          -k "not performance"
          --cov=scpn_phase_orchestrator --cov-report= --cov-fail-under=0
      - name: Rename coverage data (nn shard)
        run: mv .coverage .coverage.nn-${{ matrix.shard }}
      - name: Upload coverage data (nn shard)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data-nn-${{ matrix.shard }}
          path: .coverage.nn-${{ matrix.shard }}
          include-hidden-files: true

  julia-backend:
    # The Julia backend cannot be exercised under the main coverage matrix:
    # coverage's thread tracer stops juliacall/PythonCall from injecting
    # ``juliacall.Main`` during its C-level ``using PythonCall``, so the Julia
    # path is correctly skipped there. This lane installs juliacall and runs the
    # native-backend parity tests WITHOUT coverage, so the Julia path is
    # actually verified end to end. juliacall is an optional experimental extra
    # and is installed outside the hashed lock; juliapkg fetches the Julia
    # runtime on demand (cached in ~/.julia).
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HYPOTHESIS_PROFILE: ci
      PYTHON_JULIACALL_HANDLE_SIGNALS: "yes"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache Julia depot
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.julia
          key: julia-depot-${{ hashFiles('pyproject.toml') }}
          restore-keys: julia-depot-
      - name: Install base + optional Julia backend
        run: |
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt
          pip install --no-deps -e .
          pip install --require-hashes -r requirements/julia-lock.txt
      - name: Warm up Julia runtime (juliapkg resolves Julia + precompiles PythonCall)
        run: python -c "from juliacall import Main; print('Julia ready:', Main is not None)"
      - name: Assert Julia backend is available without coverage
        run: >
          python -c "from scpn_phase_orchestrator.upde._run import AVAILABLE_BACKENDS;
          assert 'julia' in AVAILABLE_BACKENDS, AVAILABLE_BACKENDS;
          print('backends:', AVAILABLE_BACKENDS)"
      - name: Run native-backend parity tests without coverage
        run: pytest tests/ -k backends -m "not slow" --tb=short -p no:cacheprovider

  go-backend:
    # The Go accelerator bridges compile each source to a cgo ``c-shared``
    # library that the Python runtime loads via ctypes; their FFI call bodies are
    # outside the coverage matrix. This lane compiles every Go accelerator with
    # the toolchain pinned by go/go.mod so a broken or bit-rotted source is caught
    # in CI (the Python loader contracts themselves run in the standard matrix).
    # Mirrors julia-backend: informational, not a ci-gate dependency.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Compile every Go accelerator to a c-shared library
        working-directory: go
        run: |
          go mod download
          fail=0
          for src in *.go; do
            if ! go build -buildmode=c-shared -o "lib${src%.go}.so" "$src"; then
              echo "::error file=go/${src}::go build -buildmode=c-shared failed"
              fail=1
            fi
          done
          exit "$fail"

  coverage-guard:
    needs: [test, ffi-test, nn-coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - name: Download test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-data-test
      - name: Download ffi coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-data-ffi
      - name: Download nn coverage (all shards)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-data-nn-*
          merge-multiple: true
      - name: Combine coverage and generate XML
        run: |
          coverage combine .coverage.test .coverage.ffi .coverage.nn-*
          coverage xml -o coverage-python.xml
          coverage report
      - name: Upload merged coverage XML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml-merged
          path: coverage-python.xml
      - run: python tools/coverage_guard.py --coverage-xml coverage-python.xml

  branch-coverage:
    # Branch instrumentation is heavier than line instrumentation and flips
    # host-sensitive wall-clock performance tests, which is why the main
    # coverage matrix stays line-only. This lane runs the ffi-test selection
    # with performance tests deselected and --cov-branch enabled, then gates
    # the branch rate through tools/coverage_guard_branch_thresholds.json
    # (no-decrease ratchet, fail-closed if the XML carries no branch data).
    # Wider timeout than ffi-test: on CPython 3.12 branch measurement runs on
    # the C tracer (sys.monitoring branch support needs 3.14+), so the suite
    # is markedly slower under branch instrumentation. The dev Hypothesis
    # profile (50 examples) is deliberate: this lane measures coverage, not
    # property-based correctness — the main lanes already run the ci profile
    # (500 examples) — and 500-example properties under the C tracer would
    # dominate the lane's wall clock.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HYPOTHESIS_PROFILE: dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-ffi-${{ runner.os }}-py3.12-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-ffi-${{ runner.os }}-
      - name: Build kernel and run tests with branch coverage
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
          pytest tests/ --tb=short -p no:cacheprovider \
            --ignore=tests/test_kuramoto_layer.py \
            --ignore=tests/test_stuart_landau_nn.py \
            --ignore=tests/test_bold.py \
            --ignore=tests/test_reservoir.py \
            --ignore=tests/test_ude_kuramoto.py \
            --ignore=tests/test_inverse.py \
            --ignore=tests/test_oim.py \
            --ignore=tests/test_quantum_bridge_live.py \
            --ignore=tests/test_geometry_walk.py \
            --ignore-glob=tests/test_nn_physics_validation*.py \
            -m "not slow and not performance" \
            -k "not performance" \
            --cov=scpn_phase_orchestrator --cov-branch --cov-report= --cov-fail-under=0
          coverage xml -o coverage-branch.xml
      - name: Upload branch coverage XML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml-branch
          path: coverage-branch.xml
      - run: >
          python tools/coverage_guard.py
          --coverage-xml coverage-branch.xml
          --thresholds tools/coverage_guard_branch_thresholds.json

  module-linkage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: python tools/check_product_boundaries.py
      - run: python tools/check_test_module_linkage.py

  hierarchy-transport-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - name: Run hierarchy transport boundary smoke tests
        run: |
          pytest tests/test_hierarchy_transport_demos.py tests/test_hierarchy_transport_domainpack_workflow.py \
            --maxfail=1 --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: bandit -r src/ -c pyproject.toml
      # No --ignore-vuln suppressions: both lockfiles audited clean with zero
      # ignores on 2026-07-16. Any future suppression must carry an inline
      # rationale plus a review-by date (SECURITY.md, Dependency Security).
      - run: >
          python -m pip install --require-hashes --no-deps -r requirements/audit-tools.txt
          && pip-audit

  rust-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-${{ runner.os }}-stable-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-stable-
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: cargo fmt --check
      - run: cargo clippy --workspace --exclude spo-ffi -- -D warnings
      - run: cargo doc --no-deps --workspace --exclude spo-ffi
      - run: cargo test --workspace --exclude spo-ffi
      # spo-ffi `extension-module` is a default feature; disable it so the
      # test binary can link libpython. Ubuntu-only — macOS and Windows
      # runners exercise the FFI path via the maturin wheel build in
      # ``ffi-test`` instead.
      - if: runner.os == 'Linux'
        run: cargo test -p spo-ffi --no-default-features --lib

  ffi-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            lockfile: requirements/dev-lock-py311.txt
          - os: ubuntu-latest
            python-version: "3.12"
            lockfile: requirements/dev-lock.txt
          - os: macos-latest
            python-version: "3.11"
            lockfile: requirements/dev-lock-py311.txt
          - os: macos-latest
            python-version: "3.12"
            lockfile: requirements/dev-lock.txt
          - os: windows-latest
            python-version: "3.11"
            lockfile: requirements/dev-lock-windows-ffi-py311.txt
          - os: windows-latest
            python-version: "3.12"
            lockfile: requirements/dev-lock-windows-ffi-py312.txt
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-ffi-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-ffi-${{ runner.os }}-
      - name: Build and test (Unix, lockfile)
        if: runner.os != 'Windows' && matrix.python-version == '3.12'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r ${{ matrix.lockfile }} && pip install --no-deps -e .
          pytest tests/ -v --tb=short \
            --ignore=tests/test_kuramoto_layer.py \
            --ignore=tests/test_stuart_landau_nn.py \
            --ignore=tests/test_bold.py \
            --ignore=tests/test_reservoir.py \
            --ignore=tests/test_ude_kuramoto.py \
            --ignore=tests/test_inverse.py \
            --ignore=tests/test_oim.py \
            --ignore=tests/test_quantum_bridge_live.py \
            --ignore=tests/test_geometry_walk.py \
            --ignore-glob=tests/test_nn_physics_validation*.py \
            -m "not slow and not performance" \
            -k "not performance" \
            --cov=scpn_phase_orchestrator --cov-report= --cov-fail-under=0
          mv .coverage .coverage.ffi
      - name: Upload coverage data (ffi, ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data-ffi
          path: .coverage.ffi
          include-hidden-files: true
      - name: Build and test (Unix, lockfile)
        if: runner.os != 'Windows' && matrix.python-version != '3.12'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r ${{ matrix.lockfile }} && pip install --no-deps -e .
          pytest tests/ -v --tb=short \
            --ignore=tests/test_kuramoto_layer.py \
            --ignore=tests/test_stuart_landau_nn.py \
            --ignore=tests/test_bold.py \
            --ignore=tests/test_reservoir.py \
            --ignore=tests/test_ude_kuramoto.py \
            --ignore=tests/test_inverse.py \
            --ignore=tests/test_oim.py \
            --ignore=tests/test_quantum_bridge_live.py \
            --ignore=tests/test_geometry_walk.py \
            --ignore-glob=tests/test_nn_physics_validation*.py \
            -m "not slow and not performance" \
            -k "not performance"
      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/Scripts/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r ${{ matrix.lockfile }} && pip install --no-deps -e .
          pytest tests/ -v --tb=short \
            --ignore=tests/test_kuramoto_layer.py \
            --ignore=tests/test_stuart_landau_nn.py \
            --ignore=tests/test_bold.py \
            --ignore=tests/test_reservoir.py \
            --ignore=tests/test_ude_kuramoto.py \
            --ignore=tests/test_inverse.py \
            --ignore=tests/test_oim.py \
            --ignore=tests/test_quantum_bridge_live.py \
            --ignore=tests/test_geometry_walk.py \
            --ignore-glob=tests/test_nn_physics_validation*.py \
            -m "not slow and not performance" \
            -k "not performance"

  cargo-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.1-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-audit-0.22.1-
      - name: Install cargo-audit
        run: |
          if ! cargo audit --version | grep -q '0\.22\.1'; then
            cargo install cargo-audit --version 0.22.1 --locked --force
          fi
      - name: Audit Cargo.lock
        run: cargo audit --file Cargo.lock

  cargo-deny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-deny
          key: cargo-deny-0.18.7-${{ hashFiles('spo-kernel/Cargo.lock', 'spo-kernel/deny.toml') }}
          restore-keys: cargo-deny-0.18.7-
      - name: Install cargo-deny
        run: |
          if ! cargo deny --version | grep -q '0\.18\.7'; then
            cargo install cargo-deny --version 0.18.7 --locked --force
          fi
      - name: Check Rust advisories, bans, and sources
        run: cargo deny check advisories bans sources

  rust-miri:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: spo-kernel
    env:
      MIRIFLAGS: -Zmiri-strict-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly with miri
        with:
          toolchain: nightly
          components: miri
      - name: Prepare Miri sysroot
        run: cargo miri setup
      - name: Miri pure-Rust boundary smoke
        run: |
          cargo miri test -p spo-types --lib
          cargo miri test -p spo-supervisor --lib

  rust-msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # 1.83.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-msrv-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-msrv-
      - run: cargo check --workspace --lib --exclude spo-ffi

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-benchmark-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-benchmark-
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes --no-deps -r requirements/ci-tools.txt
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: . .venv/bin/activate && python bench/run_benchmarks.py --json > bench/current.json
      - name: Compare against baseline
        run: . .venv/bin/activate && python bench/compare_baseline.py bench/baseline.json bench/current.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: benchmark-results
          path: bench/current.json

  studio-web:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.2.2
          run_install: false
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (TS strict)
        run: pnpm typecheck
      - name: Test with enforced coverage thresholds
        run: pnpm test:coverage
      - name: Build the portal and the federation remote
        run: pnpm build
      - name: Assert the ESM remote entry carries the federation name
        run: |
          test -f dist/remoteEntry.js
          grep -q "scpn_phase_orchestrator" dist/remoteEntry.js

  ci-gate:
    needs: [lint, typecheck, test, slow-tests, security, rust-check, cargo-audit, cargo-deny, rust-miri, rust-msrv, coverage-guard, module-linkage, ffi-test, benchmark, studio-web]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
