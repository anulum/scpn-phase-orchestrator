name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src/scpn_phase_orchestrator/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: >
          pytest tests/ -v --tb=short
          --cov=scpn_phase_orchestrator
          --cov-report=term-missing
          ${{ matrix.python-version == '3.12' && '--cov-report=xml:coverage-python.xml' || '' }}
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage-python.xml

  coverage-guard:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - run: python tools/coverage_guard.py --coverage-xml coverage-python.xml

  module-linkage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python tools/check_test_module_linkage.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: bandit -r src/ -c pyproject.toml

  rust-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-${{ runner.os }}-stable-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-stable-
      - run: cargo fmt --check
        if: runner.os == 'Linux'
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo doc --no-deps --workspace
        if: runner.os == 'Linux'
      - run: cargo test

  ffi-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-ffi-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-ffi-
      - run: python -m venv .venv
      - run: |
          . .venv/bin/activate
          pip install maturin
          maturin develop --release -m spo-kernel/crates/spo-ffi/Cargo.toml
          pip install -e ".[dev]"
          pytest tests/test_ffi_integration.py -v --tb=short

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: spo-kernel

  rust-msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spo-kernel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spo-kernel/target
          key: cargo-msrv-${{ hashFiles('spo-kernel/Cargo.lock') }}
          restore-keys: cargo-msrv-
      - run: cargo check --workspace --lib

  ci-gate:
    needs: [lint, typecheck, test, security, rust-check, cargo-audit, rust-msrv, coverage-guard, module-linkage, ffi-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
