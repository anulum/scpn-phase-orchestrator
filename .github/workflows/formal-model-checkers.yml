# SCPN Phase Orchestrator — External formal checker CI

name: Formal Model Checkers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/formal-model-checkers.yml"
      - "src/scpn_phase_orchestrator/supervisor/formal_export.py"
      - "src/scpn_phase_orchestrator/supervisor/__init__.py"
      - "tools/formal_model_checker_ci.py"
      - "tests/test_formal_model_checker_ci.py"
      - "benchmarks/reference_suite.py"
      - "tests/test_reference_benchmark_suite.py"
      - "domainpacks/cardiac_rhythm/binding_spec.yaml"
      - "domainpacks/chemical_reactor/binding_spec.yaml"
      - "domainpacks/power_grid/binding_spec.yaml"
      - "domainpacks/pll_clock/binding_spec.yaml"
      - "domainpacks/autonomous_vehicles/binding_spec.yaml"
      - "domainpacks/satellite_constellation/binding_spec.yaml"
      - "domainpacks/power_safety_nchannel/binding_spec.yaml"
      - "domainpacks/traffic_flow/binding_spec.yaml"
      - "domainpacks/swarm_robotics/binding_spec.yaml"
      - "domainpacks/manufacturing_spc/binding_spec.yaml"
      - "domainpacks/robotic_cpg/binding_spec.yaml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/formal-model-checkers.yml"
      - "src/scpn_phase_orchestrator/supervisor/formal_export.py"
      - "src/scpn_phase_orchestrator/supervisor/__init__.py"
      - "tools/formal_model_checker_ci.py"
      - "tests/test_formal_model_checker_ci.py"
      - "benchmarks/reference_suite.py"
      - "tests/test_reference_benchmark_suite.py"
      - "domainpacks/cardiac_rhythm/binding_spec.yaml"
      - "domainpacks/chemical_reactor/binding_spec.yaml"
      - "domainpacks/power_grid/binding_spec.yaml"
      - "domainpacks/pll_clock/binding_spec.yaml"
      - "domainpacks/autonomous_vehicles/binding_spec.yaml"
      - "domainpacks/satellite_constellation/binding_spec.yaml"
      - "domainpacks/power_safety_nchannel/binding_spec.yaml"
      - "domainpacks/traffic_flow/binding_spec.yaml"
      - "domainpacks/swarm_robotics/binding_spec.yaml"
      - "domainpacks/manufacturing_spc/binding_spec.yaml"
      - "domainpacks/robotic_cpg/binding_spec.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spin-z3-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install external formal checkers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends spin z3

      - name: Install package
        run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .

      - name: Execute SPIN/Z3 smoke and safety-domain packages
        run: python tools/formal_model_checker_ci.py --execute-ci-smoke
