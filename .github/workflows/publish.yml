# SCPN Phase Orchestrator — Publish to PyPI

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-publish CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: pip install -e ".[dev,queuewaves]"
      - run: ruff check src/ tests/
      - run: pytest tests/ -x --tb=short
      - run: python tools/check_version_sync.py
      - run: cargo clippy --workspace --exclude spo-ffi -- -D warnings
        working-directory: spo-kernel
      - run: cargo test --workspace --exclude spo-ffi
        working-directory: spo-kernel

  build-wheels:
    name: Build wheels (${{ matrix.os }}-${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Build wheel via maturin
        uses: PyO3/maturin-action@aef21716426562a9d8f5d75e57a8cee3f3329592 # v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release -m spo-kernel/crates/spo-ffi/Cargo.toml --out dist
      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build pure-Python sdist
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build==1.4.2 twine==6.2.0
      - run: python -m build --sdist
      - run: twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-fallback-wheel:
    name: Build pure-Python wheel (fallback)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build==1.4.2 twine==6.2.0
      - run: python -m build --wheel
      - run: twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel-fallback
          path: dist/*.whl

  publish-pypi:
    name: Publish scpn-phase-orchestrator to PyPI
    needs: [build-sdist, build-fallback-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-phase-orchestrator
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheel-fallback
          path: dist/
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54a752f3a06f5a68aee2013 # release/v1

  # spo-kernel Rust wheels are built and verified but published separately.
  # The spo-kernel package has its own trusted publisher configuration.
