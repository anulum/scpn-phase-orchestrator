# SCPN Phase Orchestrator — Publish to PyPI

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-publish CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: ruff check src/ tests/
      - run: pytest tests/ -x --tb=short
      - run: python tools/check_version_sync.py
      - run: cargo clippy --workspace --exclude spo-ffi -- -D warnings
        working-directory: spo-kernel
      - run: cargo test --workspace --exclude spo-ffi
        working-directory: spo-kernel

  build-wheels:
    name: Build wheels (${{ matrix.os }}-${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Build wheel via maturin
        uses: PyO3/maturin-action@aef21716426562a9d8f5d75e57a8cee3f3329592 # v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release -m spo-kernel/crates/spo-ffi/Cargo.toml --out dist
      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build pure-Python sdist
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes --no-deps -r requirements/publish-tools.txt
      - run: python -m build --sdist
      - run: twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-fallback-wheel:
    name: Build pure-Python wheel (fallback)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes --no-deps -r requirements/publish-tools.txt
      - run: python -m build --wheel
      - run: twine check dist/*
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel-fallback
          path: dist/*.whl

  publish-pypi:
    name: Publish scpn-phase-orchestrator to PyPI
    needs: [build-sdist, build-fallback-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-phase-orchestrator
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheel-fallback
          path: dist/
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54a752f3a06f5a68aee2013 # release/v1

  build-container:
    name: Build, scan, and push container image
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea7e3fd4d # v0.28.0
        with:
          image-ref: ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push to GHCR
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
            ghcr.io/anulum/scpn-phase-orchestrator:latest
          cache-from: type=gha

  # spo-kernel Rust wheels are built and verified but published separately.
  # The spo-kernel package has its own trusted publisher configuration.
