# SCPN Phase Orchestrator — Publish to PyPI

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-publish CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: pip install --require-hashes --no-deps -r requirements/dev-lock.txt && pip install --no-deps -e .
      - run: python tools/check_github_action_refs.py .github/workflows/publish.yml
        env:
          GH_TOKEN: ${{ github.token }}
      - run: ruff check src/ tests/
      - name: Run release preflight tests
        timeout-minutes: 25
        run: >
          pytest tests/ -x -vv --tb=short --durations=25
          --ignore=tests/test_kuramoto_layer.py
          --ignore=tests/test_stuart_landau_nn.py
          --ignore=tests/test_bold.py
          --ignore=tests/test_reservoir.py
          --ignore=tests/test_ude_kuramoto.py
          --ignore=tests/test_inverse.py
          --ignore=tests/test_oim.py
          --ignore=tests/test_quantum_bridge_live.py
          --ignore=tests/test_geometry_walk.py
          --ignore-glob=tests/test_nn_physics_validation*.py
      - run: python tools/check_version_sync.py
      - run: python tools/check_release_tag_version.py
      - run: python tools/check_meta_distribution.py
      - run: cargo clippy --workspace --exclude spo-ffi -- -D warnings
        working-directory: spo-kernel
      - run: cargo test --workspace --exclude spo-ffi
        working-directory: spo-kernel

  build-wheels:
    name: Build wheels (${{ matrix.os }}-${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python_interpreter: /opt/python/cp312-cp312/bin/python
          - os: ubuntu-24.04-arm
            target: aarch64
            python_interpreter: /opt/python/cp312-cp312/bin/python
          - os: macos-latest
            target: x86_64
            python_interpreter: python
          - os: macos-latest
            target: aarch64
            python_interpreter: python
          - os: windows-latest
            target: x86_64
            python_interpreter: python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Build wheel via maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release -m spo-kernel/crates/spo-ffi/Cargo.toml --out dist -i ${{ matrix.python_interpreter }}
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build pure-Python sdist
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r requirements/publish-tools.txt
      - run: python -m build --sdist
      - run: twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-fallback-wheel:
    name: Build pure-Python wheel (fallback)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r requirements/publish-tools.txt
      - run: python -m build --wheel
      - run: twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-fallback
          path: dist/*.whl

  publish-pypi:
    name: Publish scpn-phase-orchestrator to PyPI
    needs: [build-sdist, build-fallback-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-phase-orchestrator
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheel-fallback
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  build-container:
    name: Build, scan, and push container image
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write      # keyless sigstore signing of the image + provenance
      attestations: write  # store the SLSA build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "security_refresh=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
          build-args: |
            SECURITY_REFRESH_STAMP=${{ steps.meta.outputs.security_refresh }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan image with Grype
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp:/tmp \
            anchore/grype:v0.82.0 \
            ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }} \
            --scope all-layers \
            --only-fixed \
            --fail-on high \
            -o table

      - name: Push to GHCR
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anulum/scpn-phase-orchestrator:${{ steps.meta.outputs.version }}
            ghcr.io/anulum/scpn-phase-orchestrator:latest
          build-args: |
            SECURITY_REFRESH_STAMP=${{ steps.meta.outputs.security_refresh }}
          cache-from: type=gha
          provenance: mode=max
          sbom: true

      - name: Attest SLSA build provenance (container image)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/anulum/scpn-phase-orchestrator
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the container image (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/anulum/scpn-phase-orchestrator@${DIGEST}"

  # spo-kernel Rust wheels are built and verified but published separately.
  # The spo-kernel package has its own trusted publisher configuration.
