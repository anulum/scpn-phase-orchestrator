// SCPN Phase Orchestrator — packaged audit event-stream schema

syntax = "proto3";

package spo.audit;

import "google/protobuf/timestamp.proto";

message AuditEnvelope {
  uint32 schema_version = 1;
  string stream_id = 2;
  uint64 sequence = 3;
  string event_type = 4;
  google.protobuf.Timestamp recorded_at = 5;
  string source = 6;
  string previous_hash = 7;
  string payload_json = 8;
  string payload_sha256 = 9;
  string event_hash = 10;
}
