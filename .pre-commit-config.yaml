# SCPN Phase Orchestrator — Pre-commit hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "--quiet"]
        files: ^(src|tests)/
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd spo-kernel && cargo fmt --check'
        language: system
        pass_filenames: false
        files: \.rs$

      - id: version-sync
        name: version consistency
        entry: python tools/check_version_sync.py
        language: system
        pass_filenames: false
        files: (pyproject\.toml|CITATION\.cff|Cargo\.toml)
